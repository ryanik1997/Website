<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="360" height="480" viewBox="0 0 360 480">
  <rect width="360" height="480" fill="#fafafa"/>
  <rect x="0" y="0" width="360" height="42" fill="#1a365d"/>
  <text x="14" y="18" font-size="11" font-weight="bold" font-family="Arial,sans-serif" fill="#fff">READING PASSAGE 1</text>
  <text x="14" y="32" font-size="8" font-family="Arial,sans-serif" fill="#bee3f8">r1 · Cam10 Test 1</text>
  <rect x="10" y="48" width="340" height="422" rx="4" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="14" y="68" font-size="9" font-weight="bold" font-family="Arial,sans-serif" fill="#111">Questions 1–6</text>
    <text x="14" y="80" font-size="7" font-family="Arial,sans-serif" fill="#555">TRUE / FALSE / NOT GIVEN</text>
  <text x="14" y="102" font-size="8" font-family="Arial,sans-serif" fill="#111">1. There are other flightless parrots.</text><rect x="268" y="90" width="22" height="16" rx="2" fill="#fff" stroke="#333" stroke-width="0.8"/>
      <text x="279" y="102" text-anchor="middle" font-size="7" font-family="Arial,sans-serif" fill="#333">T</text><rect x="294" y="90" width="22" height="16" rx="2" fill="#fff" stroke="#333" stroke-width="0.8"/>
      <text x="305" y="102" text-anchor="middle" font-size="7" font-family="Arial,sans-serif" fill="#333">F</text><rect x="320" y="90" width="22" height="16" rx="2" fill="#fff" stroke="#333" stroke-width="0.8"/>
      <text x="331" y="102" text-anchor="middle" font-size="7" font-family="Arial,sans-serif" fill="#333">NG</text>
  <text x="14" y="124" font-size="8" font-family="Arial,sans-serif" fill="#111">2. Adults produce chicks every year.</text><rect x="268" y="112" width="22" height="16" rx="2" fill="#fff" stroke="#333" stroke-width="0.8"/>
      <text x="279" y="124" text-anchor="middle" font-size="7" font-family="Arial,sans-serif" fill="#333">T</text><rect x="294" y="112" width="22" height="16" rx="2" fill="#fff" stroke="#333" stroke-width="0.8"/>
      <text x="305" y="124" text-anchor="middle" font-size="7" font-family="Arial,sans-serif" fill="#333">F</text><rect x="320" y="112" width="22" height="16" rx="2" fill="#fff" stroke="#333" stroke-width="0.8"/>
      <text x="331" y="124" text-anchor="middle" font-size="7" font-family="Arial,sans-serif" fill="#333">NG</text>
  <text x="14" y="146" font-size="8" font-family="Arial,sans-serif" fill="#111">3. Males feed nesting females.</text><rect x="268" y="134" width="22" height="16" rx="2" fill="#fff" stroke="#333" stroke-width="0.8"/>
      <text x="279" y="146" text-anchor="middle" font-size="7" font-family="Arial,sans-serif" fill="#333">T</text><rect x="294" y="134" width="22" height="16" rx="2" fill="#fff" stroke="#333" stroke-width="0.8"/>
      <text x="305" y="146" text-anchor="middle" font-size="7" font-family="Arial,sans-serif" fill="#333">F</text><rect x="320" y="134" width="22" height="16" rx="2" fill="#fff" stroke="#333" stroke-width="0.8"/>
      <text x="331" y="146" text-anchor="middle" font-size="7" font-family="Arial,sans-serif" fill="#333">NG</text>
  <text x="14" y="164" font-size="9" font-weight="bold" font-family="Arial,sans-serif" fill="#111">Questions 7–13</text>
    <text x="14" y="176" font-size="7" font-family="Arial,sans-serif" fill="#555">Choose A, B, C or D</text>
  <text x="14" y="190" font-size="8" font-weight="bold" font-family="Arial,sans-serif" fill="#111">7. When do females lay eggs?</text>
    <g transform="translate(0,6)"><circle cx="30" cy="200" r="5" fill="#fff" stroke="#333" stroke-width="0.8"/>
      <text x="38" y="203" font-size="7" font-family="Arial,sans-serif" fill="#555">A</text><circle cx="108" cy="200" r="5" fill="#fff" stroke="#333" stroke-width="0.8"/>
      <text x="116" y="203" font-size="7" font-family="Arial,sans-serif" fill="#555">B</text><circle cx="186" cy="200" r="5" fill="#fff" stroke="#333" stroke-width="0.8"/>
      <text x="194" y="203" font-size="7" font-family="Arial,sans-serif" fill="#555">C</text><circle cx="264" cy="200" r="5" fill="#fff" stroke="#333" stroke-width="0.8"/>
      <text x="272" y="203" font-size="7" font-family="Arial,sans-serif" fill="#555">D</text></g>
  <text x="14" y="218" font-size="8" font-weight="bold" font-family="Arial,sans-serif" fill="#111">8. Numbers before conservation?</text>
    <g transform="translate(0,6)"><circle cx="30" cy="228" r="5" fill="#fff" stroke="#333" stroke-width="0.8"/>
      <text x="38" y="231" font-size="7" font-family="Arial,sans-serif" fill="#555">A</text><circle cx="108" cy="228" r="5" fill="#fff" stroke="#333" stroke-width="0.8"/>
      <text x="116" y="231" font-size="7" font-family="Arial,sans-serif" fill="#555">B</text><circle cx="186" cy="228" r="5" fill="#fff" stroke="#333" stroke-width="0.8"/>
      <text x="194" y="231" font-size="7" font-family="Arial,sans-serif" fill="#555">C</text><circle cx="264" cy="228" r="5" fill="#fff" stroke="#333" stroke-width="0.8"/>
      <text x="272" y="231" font-size="7" font-family="Arial,sans-serif" fill="#555">D</text></g>
</svg>