    <text x="117.8" y="96" font-size="8" font-family="Arial,sans-serif" fill="#111"></text>
  <text x="14" y="118" font-size="8" font-family="Arial,sans-serif" fill="#111">2. Maximum lifespan: ___ years</text>
    <rect x="127.4" y="108" width="48" height="14" rx="2" fill="#e8f4fc" stroke="#2b6cb0" stroke-width="0.9"/>
    <text x="151.4" y="118" font-size="8" font-family="Arial,sans-serif" fill="#111"></text>
  <text x="14" y="140" font-size="8" font-family="Arial,sans-serif" fill="#111">3. Diet: completely ___</text>
    <rect x="98" y="130" width="48" height="14" rx="2" fill="#e8f4fc" stroke="#2b6cb0" stroke-width="0.9"/>
    <text x="122" y="140" font-size="8" font-family="Arial,sans-serif" fill="#111"></text>
  <text x="14" y="200" font-size="9" font-weight="bold" font-family="Arial,sans-serif" fill="#111">Questions 7–13</text>
    <text x="14" y="212" font-size="7" font-family="Arial,sans-serif" fill="#555">Choose A, B, C or D</text>
  <text x="14" y="216" font-size="8" font-weight="bold" font-family="Arial,sans-serif" fill="#111">7. When do females lay eggs?</text>
    <g transform="translate(0,6)"><circle cx="30" cy="226" r="5" fill="#fff" stroke="#333" stroke-width="0.8"/>
      <text x="38" y="229" font-size="7" font-family="Arial,sans-serif" fill="#555">A</text><circle cx="108" cy="226" r="5" fill="#fff" stroke="#333" stroke-width="0.8"/>
