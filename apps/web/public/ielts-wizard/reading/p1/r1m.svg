  <text x="14" y="32" font-size="8" font-family="Arial,sans-serif" fill="#bee3f8">r1m · Cam12–14 P1</text>
  <rect x="10" y="48" width="340" height="422" rx="4" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="14" y="68" font-size="9" font-weight="bold" font-family="Arial,sans-serif" fill="#111">Questions 1–6</text>
    <text x="14" y="80" font-size="7" font-family="Arial,sans-serif" fill="#555">Complete notes — NO MORE THAN TWO WORDS</text>
  <text x="14" y="96" font-size="8" font-family="Arial,sans-serif" fill="#111">1. Type of parrot: ___</text>
