      <text x="194" y="229" font-size="7" font-family="Arial,sans-serif" fill="#555">C</text><circle cx="264" cy="226" r="5" fill="#fff" stroke="#333" stroke-width="0.8"/>
      <text x="272" y="229" font-size="7" font-family="Arial,sans-serif" fill="#555">D</text></g>
  <text x="14" y="244" font-size="8" font-weight="bold" font-family="Arial,sans-serif" fill="#111">8. Numbers before conservation?</text>
    <g transform="translate(0,6)"><circle cx="30" cy="254" r="5" fill="#fff" stroke="#333" stroke-width="0.8"/>
      <text x="38" y="257" font-size="7" font-family="Arial,sans-serif" fill="#555">A</text><circle cx="108" cy="254" r="5" fill="#fff" stroke="#333" stroke-width="0.8"/>
      <text x="116" y="257" font-size="7" font-family="Arial,sans-serif" fill="#555">B</text><circle cx="186" cy="254" r="5" fill="#fff" stroke="#333" stroke-width="0.8"/>
      <text x="194" y="257" font-size="7" font-family="Arial,sans-serif" fill="#555">C</text><circle cx="264" cy="254" r="5" fill="#fff" stroke="#333" stroke-width="0.8"/>
      <text x="272" y="257" font-size="7" font-family="Arial,sans-serif" fill="#555">D</text></g>
