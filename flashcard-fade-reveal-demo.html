<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fade Reveal Flashcard demo</title>
  <style>
    :root {
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      color: #16263c;
      background: #edf3fb;
    }
    * { box-sizing: border-box; }
    body { min-height: 100dvh; margin: 0; display: grid; place-items: center; padding: 28px; }
    main { width: min(100%, 720px); }
    h1 { margin: 0; text-align: center; font-size: 1.45rem; }
    .intro { margin: 8px 0 28px; color: #61718a; text-align: center; }

    .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 18px; }

    /* Reusable component: create cards with data-word/data-phonetic/data-translation. */
    .fade-card {
      position: relative;
      min-height: 280px;
      overflow: hidden;
      border: 0;
      border-radius: 24px;
      padding: 28px;
      color: #172237;
      text-align: center;
      cursor: pointer;
      background-color: #a9c9f5;
      box-shadow: 0 14px 30px rgb(39 75 121 / .16);
      transition: background-color 360ms ease-out, box-shadow 260ms ease-out;
      outline: none;
    }
    .fade-card:hover { box-shadow: 0 18px 36px rgb(39 75 121 / .21); }
    .fade-card:focus-visible { outline: 3px solid #315d92; outline-offset: 4px; }
    .fade-card.is-flipped { background-color: #8fe0b8; }

    .card-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px;
    }
    .card-word {
      margin: 0;
      font-size: clamp(3.4rem, 12vw, 5rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -.04em;
      transform: translateY(16px) scale(1);
      transition: transform 340ms ease-out;
      will-change: transform;
    }
    .fade-card.is-flipped .card-word { transform: translateY(-26px) scale(.85); }

    .card-hint {
      position: absolute;
      bottom: 41px;
      margin: 0;
      color: rgb(23 34 55 / .56);
      font-size: .82rem;
      transition: opacity 170ms ease-out, transform 170ms ease-out;
      will-change: opacity, transform;
    }
    .fade-card.is-flipped .card-hint { opacity: 0; transform: translateY(-5px); pointer-events: none; }

    .card-details {
      position: absolute;
      top: calc(50% + 12px);
      left: 24px;
      right: 24px;
      display: grid;
      gap: 7px;
      pointer-events: none;
    }
    .phonetic, .translation {
      margin: 0;
      opacity: 0;
      transform: translateY(8px);
      will-change: opacity, transform;
    }
    .phonetic {
      color: #5d7267;
      font-size: .96rem;
      font-style: italic;
      transition: opacity 230ms ease-out 0ms, transform 230ms ease-out 0ms;
    }
    .translation {
      color: #10251a;
      font-size: 1.35rem;
      font-weight: 800;
      transition: opacity 270ms ease-out 0ms, transform 270ms ease-out 0ms;
    }
    /* 70ms stagger: both start while the background transition is already running. */
    .fade-card.is-flipped .phonetic { opacity: 1; transform: translateY(0); transition-delay: 70ms; }
    .fade-card.is-flipped .translation { opacity: 1; transform: translateY(0); transition-delay: 140ms; }

    @media (prefers-reduced-motion: reduce) {
      .fade-card, .card-word, .card-hint, .phonetic, .translation { transition-duration: 1ms !important; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Fade Reveal Flashcard</h1>
    <p class="intro">Bấm vào bất kỳ thẻ nào để mở/đóng. Enter và Space cũng hoạt động.</p>
    <section class="card-grid" id="cardGrid" aria-label="Flashcard demo"></section>
  </main>

  <template id="fadeCardTemplate">
    <article class="fade-card" role="button" tabindex="0" aria-pressed="false">
      <div class="card-content">
        <h2 class="card-word"></h2>
        <div class="card-details" aria-hidden="true">
          <p class="phonetic"></p>
          <p class="translation"></p>
        </div>
        <p class="card-hint">Click để lật</p>
      </div>
    </article>
  </template>

  <script>
    /**
     * Vanilla reusable component.
     * Usage: createFadeCard({ word: '한국', phonetic: 'han-guk', translation: 'Hàn Quốc' })
     */
    function createFadeCard({ word, phonetic, translation }) {
      const template = document.querySelector('#fadeCardTemplate');
      const card = template.content.firstElementChild.cloneNode(true);
      card.querySelector('.card-word').textContent = word;
      card.querySelector('.phonetic').textContent = phonetic;
      card.querySelector('.translation').textContent = translation;
      card.setAttribute('aria-label', `Flashcard ${word}`);

      const toggle = () => {
        const isFlipped = card.classList.toggle('is-flipped');
        card.setAttribute('aria-pressed', String(isFlipped));
      };
      card.addEventListener('click', toggle);
      card.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          toggle();
        }
      });
      return card;
    }

    const examples = [
      { word: '한국', phonetic: 'han-guk', translation: 'Hàn Quốc' },
      { word: '사랑', phonetic: 'sa-rang', translation: 'Tình yêu' },
    ];
    const grid = document.querySelector('#cardGrid');
    examples.forEach(data => grid.append(createFadeCard(data)));
  </script>
</body>
</html>
